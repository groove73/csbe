# ============================================================
# Common configuration (applied to all profiles)
# ============================================================
quarkus:
  http:
    port: 8080
    auth:
      proactive: false
  smallrye-jwt:
    silent: true

# JWT / Smallrye JWT configuration (Supabase JWKS)
mp:
  jwt:
    verify:
      publickey:
        location: "https://xvzylaubzixvlrzjrdon.supabase.co/auth/v1/.well-known/jwks.json"
      issuer: "https://xvzylaubzixvlrzjrdon.supabase.co/auth/v1"

# Application-level config (overridden per profile)
app:
  jwt:
    secret: "${JWT_SECRET}"
    expiration-ms: 604800000

api:
  charging:
    key: "${CHARGING_API_KEY}"
